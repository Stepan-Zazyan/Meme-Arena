spring:
  application:
    name: meme-arena-backend
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: ${BACKEND_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
info:
  app:
    name: meme-arena-backend
    version: 0.1.0
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
media:
  cleanup:
    enabled: false
    fixed-delay-ms: 3600000
  storage:
    type: minio
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minio}
      secret-key: ${MINIO_SECRET_KEY:minio_password}
      bucket: ${MINIO_BUCKET:meme-images}
app:
  admin-token: ${MEME_ARENA_ADMIN_TOKEN:}
  ip-hash-pepper: ${APP_IP_HASH_PEPPER:local-dev-pepper-change-me}
  proxy:
    trust-forwarded-headers: false
  scout:
    early-window-hours: 24
    max-early-battles: 30
    resolution-delay-hours: 72
    minimum-battles-for-resolution: 20
    success-percentile: 0.25
    expiration-hours: 168
    fallback-win-rate: 0.60
    fallback-rating: 1532
    resolver:
      enabled: true
      fixed-delay: PT30M
  tournament:
    enabled: ${APP_TOURNAMENT_ENABLED:false}
    time-zone: Europe/Moscow
    participants: 16
    minimum-participants: 8
    minimum-meme-battles: 5
    round-duration-hours: 6
