spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:meme_arena}}
    username: ${POSTGRES_USER:meme_arena}
    password: ${POSTGRES_PASSWORD:meme_arena_local}
  flyway:
    locations: classpath:db/migration,classpath:db/migration/local
app:
  scout:
    resolver:
      enabled: false
  tournament:
    enabled: false
