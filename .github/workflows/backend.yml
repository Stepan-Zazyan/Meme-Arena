name: Backend CI
on:
  push:
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Check conflict markers
        run: '! rg -n "<<<<<<<|=======|>>>>>>>" . --glob "!.git/**"'
      - name: Validate Flyway migration versions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          files=list(Path('backend/src/main/resources/db/migration').glob('V*__*.sql'))
          versions=[p.name.split('__',1)[0] for p in files]
          dup=sorted({v for v in versions if versions.count(v)>1})
          assert not dup, f'duplicate root Flyway versions: {dup}'
          PY
      - name: Compile
        run: mvn -B -f backend/pom.xml -DskipTests compile
      - name: Unit and integration tests
        run: mvn -B -f backend/pom.xml test
