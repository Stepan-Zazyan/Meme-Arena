name: Backend CI
on:
  push:
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Check conflict markers
        run: '! rg -n "<<<<<<<|=======|>>>>>>>" . --glob "!.git/**"'
      - name: Validate Flyway migration versions
        run: |
          python3 - <<'PY'
          from collections import defaultdict
          from pathlib import Path
          import re

          root = Path('backend/src/main/resources/db/migration')
          versioned = defaultdict(list)
          pattern = re.compile(r'^V([0-9]+(?:[._][0-9]+)*)__.+\.sql$')

          for migration in root.rglob('*.sql'):
              match = pattern.match(migration.name)
              if match:
                  versioned[match.group(1).replace('_', '.')].append(str(migration))

          duplicates = {version: paths for version, paths in versioned.items() if len(paths) > 1}
          assert not duplicates, f'duplicate Flyway versions: {duplicates}'
          print(f'Validated {sum(len(paths) for paths in versioned.values())} versioned Flyway migrations')
          PY
      - name: Compile
        run: mvn -B -f backend/pom.xml -DskipTests compile
      - name: Unit and integration tests
        run: mvn -B -f backend/pom.xml test
